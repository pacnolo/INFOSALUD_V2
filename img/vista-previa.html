<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Iconos SVG IMSS</title>
<style>
body{font-family:Arial,sans-serif;background:#f7faf9;padding:24px}
.grid{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:16px}
.card{background:#fff;border:1px solid #d7e7e3;border-radius:14px;padding:20px;text-align:center}
.card img{width:90px;height:90px;object-fit:contain;display:block;margin:0 auto 12px}
.card span{font-size:14px}
</style>
</head>
<body><div class="grid"><div class="card"><img src="consultas-medicas.svg" alt=""><span>Consultas Medicas</span></div>
<div class="card"><img src="egresos-hospitalarios.svg" alt=""><span>Egresos Hospitalarios</span></div>
<div class="card"><img src="dia-tipico.svg" alt=""><span>Dia Tipico</span></div>
<div class="card"><img src="ifu-linea.svg" alt=""><span>Ifu Linea</span></div>
<div class="card"><img src="bitacora-recepcion.svg" alt=""><span>Bitacora Recepcion</span></div>
<div class="card"><img src="extractor.svg" alt=""><span>Extractor</span></div>
<div class="card"><img src="editor-moce.svg" alt=""><span>Editor Moce</span></div>
<div class="card"><img src="ids.svg" alt=""><span>Ids</span></div>
<div class="card"><img src="sispa.svg" alt=""><span>Sispa</span></div>
<div class="card"><img src="sapb.svg" alt=""><span>Sapb</span></div>
<div class="card"><img src="simoc-catalogos.svg" alt=""><span>Simoc Catalogos</span></div>
<div class="card"><img src="indoqc-umae.svg" alt=""><span>Indoqc Umae</span></div></div></body></html>
